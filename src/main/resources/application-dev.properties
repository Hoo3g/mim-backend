# Server
server.port=8080

# PostgreSQL (Local Dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/mim_db
spring.datasource.username=mim_user
spring.datasource.password=mim_password_dev
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Multipart upload (PDF)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT (sample values for development)
jwt.secret=sample-dev-secret-key-change-me-please-32chars-minimum
jwt.accessTokenExpiration=3600000
jwt.refreshTokenExpiration=2592000000

# Refresh cookie (dev)
auth.refresh-cookie.name=refresh_token
auth.refresh-cookie.path=/api/v1/auth
auth.refresh-cookie.same-site=Lax
auth.refresh-cookie.secure=false

# Google OAuth
google.oauth.client-id=983439776863-h1dbo93cbt93bpcnq5q15940cpk4a22o.apps.googleusercontent.com
# Redis (Custom namespace)
app.redis.host=localhost
app.redis.port=6379
app.redis.password=mim_redis_dev
app.redis.max-memory=256mb

# MinIO (Custom namespace)
app.minio.endpoint=http://localhost:9000
app.minio.access-key=mim_admin
app.minio.secret-key=mim_minio_dev
app.minio.bucket=mim-local-bucket
