# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET}
jwt.accessTokenExpiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
jwt.refreshTokenExpiration=${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}

# Refresh cookie (prod)
auth.refresh-cookie.name=${AUTH_REFRESH_COOKIE_NAME:refresh_token}
auth.refresh-cookie.path=${AUTH_REFRESH_COOKIE_PATH:/api/v1/auth}
auth.refresh-cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
auth.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:true}

# Google OAuth
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}

# Redis (Custom namespace)
app.redis.host=${APP_REDIS_HOST}
app.redis.port=${APP_REDIS_PORT:6379}
app.redis.password=${APP_REDIS_PASSWORD}
app.redis.max-memory=${APP_REDIS_MAX_MEMORY:256mb}

# MinIO (Custom namespace)
app.minio.endpoint=${APP_MINIO_ENDPOINT}
app.minio.access-key=${APP_MINIO_ACCESS_KEY}
app.minio.secret-key=${APP_MINIO_SECRET_KEY}
app.minio.bucket=${APP_MINIO_BUCKET}
